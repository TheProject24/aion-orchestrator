syntax = "proto3";

package aion;

service ModelOrchestrator { 
    rpc Predict (InferenceRequest) returns (InferenceResponse);
}

message InferenceRequest {
    string model_name = 1;
    bytes input_data = 2;
}

message InferenceResponse {
    string prediction = 1;
    float confidence = 2;
    string worker_id = 3;
}