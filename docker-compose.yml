services:
  worker-1:
    build: ./worker
    image: aion-worker-base
    command: python worker.py --port 50051

  worker-2:
    image: aion-worker-base
    command: python worker.py --port 50052
    depends_on:
      - worker-1

  worker-3:
    image: aion-worker-base
    command: python worker.py --port 50053
    depends_on:
      - worker-1

  worker-4:
    image: aion-worker-base
    command: python worker.py --port 50054
    depends_on:
      - worker-1

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      - worker-1
      - worker-2
      - worker-3
      - worker-4
